name: No-op (Pages serves from main root)
# GitHub Pages is configured to serve from the main branch root.
# HTML files live at the repo root alongside assets/.
# No build step needed - just push to main and Pages updates automatically.
on:
  push:
    branches: [main]
jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Site served directly from main branch root. No build required."
